<!DOCTYPE html>
<!-- SPDX-License-Identifier: MPL-2.0 -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#070d14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#dde8f2" media="(prefers-color-scheme: light)" />
  <title>UNO Q · VLM Chat</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Apply saved theme before first paint to avoid flash -->
  <script>
    (function () {
      var t = localStorage.getItem('uno-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <!-- Canvas lives outside #app so it sits behind the entire UI in the root stacking context -->
  <section id="stage-wrap">
    <canvas id="stage"></canvas>
    <span id="stage-label">waking up…</span>
  </section>

  <div id="app" data-tab="chat">
    <header id="bar">
      <div class="brand">
        <span class="dot-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <div class="title"><strong>UNO&nbsp;Q</strong><span class="sub">vlm&nbsp;chat</span></div>
      </div>
      <div class="controls">
        <button id="theme-toggle" class="icon-btn theme-btn" title="Toggle theme" aria-label="Toggle light/dark mode">
          <!-- Sun: visible in dark mode (click to go light) -->
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <!-- Moon: visible in light mode (click to go dark) -->
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        </button>
        <span id="status" class="pill" data-state="boot">booting</span>
      </div>
    </header>

    <nav id="tabs" role="tablist">
      <button class="tab active" data-tab="chat" role="tab">Chat</button>
      <button class="tab" data-tab="detect" role="tab">Detect</button>
    </nav>

    <main id="views">
      <!-- CHAT -->
      <section id="chat-view" class="view active">
        <div id="log" aria-live="polite"></div>
        <form id="composer" autocomplete="off">
          <div id="attach-chip" class="chip hidden">
            <img id="attach-thumb" alt="attachment" />
            <button type="button" id="attach-remove" title="remove">×</button>
          </div>
          <div class="row">
            <button type="button" id="attach-btn" class="icon-btn" title="Attach image" aria-label="Attach image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input type="file" id="file" accept="image/*" hidden />
            <textarea id="text" rows="1" placeholder="Message UNO Q…"></textarea>
            <button type="submit" id="send" class="icon-btn send" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>
            </button>
          </div>
        </form>
      </section>

      <!-- DETECT -->
      <section id="detect-view" class="view">
        <div id="det-stage">
          <canvas id="det-canvas"></canvas>
          <div id="det-empty">Drop an image to spot objects<br><small id="det-classes"></small></div>
        </div>
        <div id="det-results"></div>
        <div id="det-bar">
          <button type="button" id="det-upload" class="icon-btn" title="Upload image" aria-label="Upload image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          </button>
          <input type="file" id="det-file" accept="image/*" hidden />
          <button type="button" id="det-run" class="det-run">Detect</button>
          <span id="det-meta"></span>
        </div>
      </section>
    </main>

    <div id="drop-hint">drop image</div>
  </div>

  <script src="app.js"></script>
  <script>
    // Watch #log for first message — triggers centered→bottom settle animation
    (function () {
      var log = document.getElementById('log');
      var chatView = document.getElementById('chat-view');
      function check() {
        if (log.children.length > 0 && !chatView.classList.contains('has-messages')) {
          chatView.classList.add('has-messages');
        }
      }
      new MutationObserver(check).observe(log, { childList: true });
      check();
    })();
  </script>
  <script>
    // Theme toggle — runs after DOM is ready
    (function () {
      function currentTheme() {
        var saved = localStorage.getItem('uno-theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var next = currentTheme() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('uno-theme', next);
      });
    })();
  </script>
</body>
</html>
